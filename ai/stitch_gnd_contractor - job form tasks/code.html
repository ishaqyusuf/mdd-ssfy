<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Job - Details &amp; Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2bee79",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102217",
                        "surface-dark": "#162e21", 
                        "surface-border": "#284e3a",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "Noto Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased selection:bg-primary selection:text-black">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden pb-40">
<!-- Header -->
<header class="sticky top-0 z-50 flex items-center justify-between bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md px-4 py-4 border-b border-transparent dark:border-surface-border/30 transition-all">
<button class="flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-2xl dark:text-white">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-wide flex-1 text-center">Add Job</h2>
<button class="flex h-10 items-center justify-center px-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="text-red-500 dark:text-[#ff8a8a] text-sm font-bold tracking-wide">Cancel</span>
</button>
</header>
<main class="flex-1 px-4 pt-2 space-y-8">
<!-- Job Info Section -->
<section class="space-y-4">
<div class="flex flex-col gap-4">
<!-- Title Field -->
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-gray-500 dark:text-gray-400 ml-2">Job Title <span class="text-primary">*</span></span>
<div class="relative">
<input class="form-input flex w-full rounded-xl border border-gray-200 dark:border-surface-border bg-white dark:bg-surface-dark h-14 px-5 text-base focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all placeholder:text-gray-400 dark:text-white dark:placeholder:text-gray-500" placeholder="e.g. Smith Residence Renovation" type="text" value="Project Alpha (Default)"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-primary material-symbols-outlined">edit</span>
</div>
</label>
<!-- Description Field -->
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-gray-500 dark:text-gray-400 ml-2">Description <span class="text-xs font-normal opacity-70">(Optional)</span></span>
<textarea class="form-textarea flex w-full rounded-lg border border-gray-200 dark:border-surface-border bg-white dark:bg-surface-dark min-h-[120px] px-5 py-4 text-base focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all placeholder:text-gray-400 dark:text-white dark:placeholder:text-gray-500 resize-none" placeholder="Enter specific job details, access codes, or warnings..."></textarea>
</label>
</div>
</section>
<!-- Unit Tasks List -->
<section>
<div class="flex items-center justify-between mb-4 px-2">
<h3 class="text-lg font-bold text-gray-900 dark:text-white">Unit Tasks List</h3>
<button class="text-primary text-sm font-bold hover:underline">+ Add Custom</button>
</div>
<div class="space-y-3">
<!-- Task Item 1 -->
<div class="flex items-center justify-between p-4 rounded-lg bg-white dark:bg-surface-dark border border-gray-200 dark:border-surface-border shadow-sm">
<div class="flex flex-col flex-1 pr-4">
<span class="text-base font-semibold text-gray-900 dark:text-white">Single Front Door</span>
<span class="text-sm text-gray-500 dark:text-gray-400 font-medium">$50.00 <span class="text-xs opacity-70">/ unit</span></span>
</div>
<div class="flex items-center bg-gray-100 dark:bg-[#0b1810] rounded-full p-1 border border-gray-200 dark:border-surface-border">
<button class="size-8 flex items-center justify-center rounded-full bg-white dark:bg-surface-border text-gray-900 dark:text-white shadow-sm hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm font-bold">remove</span>
</button>
<input class="w-10 bg-transparent text-center border-none focus:ring-0 p-0 text-gray-900 dark:text-white font-bold [appearance:textfield] [&amp;::-webkit-inner-spin-button]:appearance-none [&amp;::-webkit-outer-spin-button]:appearance-none" type="number" value="1"/>
<button class="size-8 flex items-center justify-center rounded-full bg-primary text-black shadow-sm hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm font-bold">add</span>
</button>
</div>
</div>
<!-- Task Item 2 -->
<div class="flex items-center justify-between p-4 rounded-lg bg-white dark:bg-surface-dark border border-gray-200 dark:border-surface-border shadow-sm">
<div class="flex flex-col flex-1 pr-4">
<span class="text-base font-semibold text-gray-900 dark:text-white">Garage Door</span>
<span class="text-sm text-gray-500 dark:text-gray-400 font-medium">$120.00 <span class="text-xs opacity-70">/ unit</span></span>
</div>
<div class="flex items-center bg-gray-100 dark:bg-[#0b1810] rounded-full p-1 border border-gray-200 dark:border-surface-border">
<button class="size-8 flex items-center justify-center rounded-full bg-white dark:bg-surface-border text-gray-900 dark:text-white shadow-sm hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm font-bold">remove</span>
</button>
<input class="w-10 bg-transparent text-center border-none focus:ring-0 p-0 text-gray-500 dark:text-gray-400 font-medium [appearance:textfield] [&amp;::-webkit-inner-spin-button]:appearance-none [&amp;::-webkit-outer-spin-button]:appearance-none" type="number" value="0"/>
<button class="size-8 flex items-center justify-center rounded-full bg-primary text-black shadow-sm hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm font-bold">add</span>
</button>
</div>
</div>
<!-- Task Item 3 -->
<div class="flex items-center justify-between p-4 rounded-lg bg-white dark:bg-surface-dark border border-gray-200 dark:border-surface-border shadow-sm">
<div class="flex flex-col flex-1 pr-4">
<span class="text-base font-semibold text-gray-900 dark:text-white">Base Trim</span>
<span class="text-sm text-gray-500 dark:text-gray-400 font-medium">$15.00 <span class="text-xs opacity-70">/ ft</span></span>
</div>
<div class="flex items-center bg-gray-100 dark:bg-[#0b1810] rounded-full p-1 border border-gray-200 dark:border-surface-border">
<button class="size-8 flex items-center justify-center rounded-full bg-white dark:bg-surface-border text-gray-900 dark:text-white shadow-sm hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm font-bold">remove</span>
</button>
<input class="w-12 bg-transparent text-center border-none focus:ring-0 p-0 text-gray-900 dark:text-white font-bold [appearance:textfield] [&amp;::-webkit-inner-spin-button]:appearance-none [&amp;::-webkit-outer-spin-button]:appearance-none" type="number" value="120"/>
<button class="size-8 flex items-center justify-center rounded-full bg-primary text-black shadow-sm hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm font-bold">add</span>
</button>
</div>
</div>
<!-- Task Item 4 -->
<div class="flex items-center justify-between p-4 rounded-lg bg-white dark:bg-surface-dark border border-gray-200 dark:border-surface-border shadow-sm">
<div class="flex flex-col flex-1 pr-4">
<span class="text-base font-semibold text-gray-900 dark:text-white">Attic Door</span>
<span class="text-sm text-gray-500 dark:text-gray-400 font-medium">$80.00 <span class="text-xs opacity-70">/ unit</span></span>
</div>
<div class="flex items-center bg-gray-100 dark:bg-[#0b1810] rounded-full p-1 border border-gray-200 dark:border-surface-border">
<button class="size-8 flex items-center justify-center rounded-full bg-white dark:bg-surface-border text-gray-900 dark:text-white shadow-sm hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm font-bold">remove</span>
</button>
<input class="w-10 bg-transparent text-center border-none focus:ring-0 p-0 text-gray-500 dark:text-gray-400 font-medium [appearance:textfield] [&amp;::-webkit-inner-spin-button]:appearance-none [&amp;::-webkit-outer-spin-button]:appearance-none" type="number" value="0"/>
<button class="size-8 flex items-center justify-center rounded-full bg-primary text-black shadow-sm hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm font-bold">add</span>
</button>
</div>
</div>
</div>
</section>
<!-- Extras Section -->
<section class="space-y-4 pt-4 border-t border-dashed border-gray-200 dark:border-surface-border/50">
<h3 class="text-lg font-bold text-gray-900 dark:text-white px-2">Additional Charges</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-gray-500 dark:text-gray-400 ml-2">Extra Charge</span>
<div class="relative">
<span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500 font-bold">$</span>
<input class="form-input flex w-full rounded-xl border border-gray-200 dark:border-surface-border bg-white dark:bg-surface-dark h-14 pl-9 pr-5 text-base focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all placeholder:text-gray-400 dark:text-white dark:placeholder:text-gray-500" placeholder="0.00" type="number"/>
</div>
</label>
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-gray-500 dark:text-gray-400 ml-2">Reason</span>
<input class="form-input flex w-full rounded-xl border border-gray-200 dark:border-surface-border bg-white dark:bg-surface-dark h-14 px-5 text-base focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all placeholder:text-gray-400 dark:text-white dark:placeholder:text-gray-500" placeholder="e.g. Rush fee, Materials..." type="text"/>
</label>
</div>
</section>
<!-- Final Details -->
<section class="space-y-4 pt-4 pb-8">
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-gray-500 dark:text-gray-400 ml-2">Note to Admin</span>
<input class="form-input flex w-full rounded-xl border border-gray-200 dark:border-surface-border bg-white dark:bg-surface-dark h-14 px-5 text-base focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all placeholder:text-gray-400 dark:text-white dark:placeholder:text-gray-500" placeholder="Add a note..." type="text"/>
</label>
<div class="flex flex-col gap-3">
<span class="text-sm font-semibold text-gray-500 dark:text-gray-400 ml-2">Select Co-Worker</span>
<div class="flex gap-4 overflow-x-auto pb-2 -mx-4 px-4 scrollbar-hide">
<!-- Add New Option -->
<button class="shrink-0 flex flex-col items-center gap-2 group">
<div class="size-14 rounded-full bg-gray-100 dark:bg-surface-dark border-2 border-dashed border-gray-300 dark:border-surface-border flex items-center justify-center group-hover:border-primary transition-colors">
<span class="material-symbols-outlined text-gray-400 group-hover:text-primary">person_add</span>
</div>
<span class="text-xs font-medium text-gray-500">Add</span>
</button>
<!-- Co-Worker 1 (Selected) -->
<button class="shrink-0 flex flex-col items-center gap-2 relative">
<div class="size-14 rounded-full border-2 border-primary p-0.5">

</div>
<span class="text-xs font-bold text-gray-900 dark:text-white">You</span>
<div class="absolute -top-1 -right-1 bg-primary text-black rounded-full size-5 flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] font-bold">check</span>
</div>
</button>
<!-- Co-Worker 2 -->
<button class="shrink-0 flex flex-col items-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
<div class="size-14 rounded-full border-2 border-transparent p-0.5">
<div class="size-full rounded-full bg-cover bg-center" data-alt="Portrait of a man looking focused" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBoXWjTvJISVLs9SMiqxa4OE57gpYaAZgCk7T6jIil8WXqief6q0pCfAmCS-S0ruoAZbF6TkIyRhDF4ol63vTvx9OgaxZxCCR94sljvGZ1YFjQrEQYJK6IGi2WSjzUvoD1l3vFQJ6sNqRKALc9I-fxPBz3WTHcb5D43g2i6RAdjhXoBrriSnaIOdYATeyZL1_sJgVshH2SAd-48oxPY-YNCorK_G1Xk3N7ep89-VTfMmAGLcPY1BzQf_Q0Y2IUZW1QPhGmFa3smvBo');"></div>
</div>
<span class="text-xs font-medium text-gray-500 dark:text-gray-400">Mike</span>
</button>
<!-- Co-Worker 3 -->
<button class="shrink-0 flex flex-col items-center gap-2 opacity-60 hover:opacity-100 transition-opacity">
<div class="size-14 rounded-full border-2 border-transparent p-0.5">
<div class="size-full rounded-full bg-cover bg-center" data-alt="Portrait of a smiling woman" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAXv7kRd5MYLyBkKbhtA6zpCYAhmf0tjbfXzz_96G0Jq2yGQyNW0aZcHcV8lHQ70_uzy4_8Vo9FpIGyLUQq6gR7iXgLQmq8rDmL5I5BIPntayFK6GukqdPmRo6kNLTHn0qIKZXMIIJnjAZWWlF_21RpV6u2g_jqfA4ErGsgpjfSHsQ6lS9QQH0EwmzUmtRJddGci6BRe0f5s2_we9HgNJ9X-6PTvNiTZt-rf1oqFn9rplTmRO8NVPSk5hwkDZ2MQqo2q6vKQial108');"></div>
</div>
<span class="text-xs font-medium text-gray-500 dark:text-gray-400">Sarah</span>
</button>
</div>
</div>
</section>
</main>
<!-- Sticky Footer -->
<div class="fixed bottom-0 left-0 w-full z-40 bg-white/90 dark:bg-[#0b1810]/95 backdrop-blur-xl border-t border-gray-200 dark:border-surface-border p-4 pb-8 safe-area-pb">
<div class="flex flex-col gap-4 max-w-lg mx-auto">
<div class="flex items-end justify-between px-2">
<div class="flex flex-col">
<span class="text-sm font-medium text-gray-500 dark:text-gray-400">Total Estimate</span>
<span class="text-xs text-gray-400 dark:text-gray-600">Includes 4 items</span>
</div>
<div class="flex items-baseline gap-1">
<span class="text-3xl font-bold text-gray-900 dark:text-primary tracking-tight">$1,850.00</span>
</div>
</div>
<button class="flex w-full items-center justify-center gap-2 rounded-xl bg-primary h-14 text-black text-lg font-bold hover:bg-[#25cc68] active:scale-[0.98] transition-all shadow-[0_0_20px_rgba(43,238,121,0.2)]">
<span>Submit Job</span>
<span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>
</div>
</div>
