<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Contractor Profile</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2bee79",
              "background-light": "#f6f8f7",
              "background-dark": "#102217",
              "surface-dark": "#1A2C22", 
            },
            fontFamily: {
              "display": ["Spline Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom toggle switch styling since we can't use JS */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #2bee79;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #2bee79;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white min-h-screen pb-24">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-b border-gray-200 dark:border-white/5">
<div class="flex items-center p-4 justify-between max-w-md mx-auto">
<div class="w-12"></div> <!-- Spacer for centering -->
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center">Profile</h2>
<div class="flex w-12 items-center justify-end">
<button class="text-primary text-base font-bold hover:opacity-80 transition-opacity">Edit</button>
</div>
</div>
</header>
<main class="max-w-md mx-auto w-full flex flex-col items-center pt-2">
<!-- Profile Header -->
<div class="w-full flex flex-col items-center p-6 gap-4">
<div class="relative">
<div class="w-32 h-32 rounded-full bg-gray-700 bg-cover bg-center border-4 border-white/5 dark:border-white/10 shadow-xl" data-alt="Portrait of a professional contractor smiling" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCFFN5-x6tfhE7X0FA_KJYi_qVwMUSvMfIKvoXbPHw0BikV5CbhyK7gtKK5ngxCMQx_9gJH9XOYLwiTzkSdgstYFDwSR-PP8qd5CRwYOdBoTsSaCOM9n1TmsgVGil3UsIQ3if27YpLusPzPSaaM15P_6JKm3LQ2SK2v166dmuhJE2nrB28DbVIvezvyAuJlcglJ834R56JL_coin7fBYAJ9_gutj7k6ChxQ3cFc_J8HWp2vDbyW0F9dBFmZQ7qnGkB4D2MtkJpaHrE');">
</div>
<!-- Status Badge -->
<div class="absolute bottom-1 right-1 bg-background-dark rounded-full p-1 border border-white/10">
<div class="bg-primary text-background-dark rounded-full p-1">
<span class="material-symbols-outlined text-[16px] font-bold block">check</span>
</div>
</div>
</div>
<div class="flex flex-col items-center justify-center gap-1">
<h1 class="text-2xl font-bold leading-tight">John Doe</h1>
<div class="flex items-center gap-2">
<span class="px-3 py-1 bg-primary/20 text-primary text-xs font-semibold rounded-full uppercase tracking-wider">Verified Contractor</span>
</div>
<p class="text-slate-500 dark:text-gray-400 text-sm mt-1">ID: 8493-21 • <span class="text-yellow-400">★ 4.9</span></p>
</div>
</div>
<!-- Section: Account -->
<div class="w-full px-4 mt-2">
<h3 class="text-slate-500 dark:text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2 px-2">Account</h3>
<div class="flex flex-col bg-white dark:bg-white/5 rounded-2xl overflow-hidden shadow-sm border border-gray-100 dark:border-white/5">
<!-- Item: Personal Info -->
<button class="flex items-center gap-4 p-4 w-full text-left hover:bg-gray-50 dark:hover:bg-white/10 transition-colors border-b border-gray-100 dark:border-white/5 group">
<div class="flex items-center justify-center rounded-full bg-gray-100 dark:bg-white/10 text-slate-600 dark:text-primary shrink-0 size-10">
<span class="material-symbols-outlined">person</span>
</div>
<div class="flex-1 min-w-0">
<p class="text-base font-medium truncate group-hover:text-primary transition-colors">Personal Information</p>
<p class="text-xs text-slate-400 truncate">Name, DOB, Address</p>
</div>
<span class="material-symbols-outlined text-slate-400 dark:text-gray-600">chevron_right</span>
</button>
<!-- Item: Contact Details -->
<button class="flex items-center gap-4 p-4 w-full text-left hover:bg-gray-50 dark:hover:bg-white/10 transition-colors border-b border-gray-100 dark:border-white/5 group">
<div class="flex items-center justify-center rounded-full bg-gray-100 dark:bg-white/10 text-slate-600 dark:text-primary shrink-0 size-10">
<span class="material-symbols-outlined">mail</span>
</div>
<div class="flex-1 min-w-0">
<p class="text-base font-medium truncate group-hover:text-primary transition-colors">Contact Details</p>
<p class="text-xs text-slate-400 truncate">Email, Phone Number</p>
</div>
<span class="material-symbols-outlined text-slate-400 dark:text-gray-600">chevron_right</span>
</button>
<!-- Item: Payment -->
<button class="flex items-center gap-4 p-4 w-full text-left hover:bg-gray-50 dark:hover:bg-white/10 transition-colors group">
<div class="flex items-center justify-center rounded-full bg-gray-100 dark:bg-white/10 text-slate-600 dark:text-primary shrink-0 size-10">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<div class="flex-1 min-w-0">
<p class="text-base font-medium truncate group-hover:text-primary transition-colors">Payment Methods</p>
<p class="text-xs text-slate-400 truncate">Chase Bank **** 1234</p>
</div>
<span class="material-symbols-outlined text-slate-400 dark:text-gray-600">chevron_right</span>
</button>
</div>
</div>
<!-- Section: Settings -->
<div class="w-full px-4 mt-8">
<h3 class="text-slate-500 dark:text-gray-400 text-sm font-semibold uppercase tracking-wider mb-2 px-2">App Settings</h3>
<div class="flex flex-col bg-white dark:bg-white/5 rounded-2xl overflow-hidden shadow-sm border border-gray-100 dark:border-white/5">
<!-- Item: Notifications (Toggle) -->
<div class="flex items-center gap-4 p-4 w-full justify-between border-b border-gray-100 dark:border-white/5">
<div class="flex items-center gap-4 overflow-hidden">
<div class="flex items-center justify-center rounded-full bg-gray-100 dark:bg-white/10 text-slate-600 dark:text-primary shrink-0 size-10">
<span class="material-symbols-outlined">notifications</span>
</div>
<p class="text-base font-medium truncate">Push Notifications</p>
</div>
<!-- Toggle Switch -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 dark:border-gray-600 appearance-none cursor-pointer peer checked:right-0 checked:border-primary transition-all duration-300" id="toggle-notif" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 dark:bg-gray-700 cursor-pointer peer-checked:bg-primary transition-colors duration-300" for="toggle-notif"></label>
</div>
</div>
<!-- Item: Dark Mode (Locked) -->
<div class="flex items-center gap-4 p-4 w-full justify-between border-b border-gray-100 dark:border-white/5 opacity-80">
<div class="flex items-center gap-4 overflow-hidden">
<div class="flex items-center justify-center rounded-full bg-gray-100 dark:bg-white/10 text-slate-600 dark:text-primary shrink-0 size-10">
<span class="material-symbols-outlined">dark_mode</span>
</div>
<div class="flex-1">
<p class="text-base font-medium truncate">Dark Mode</p>
<p class="text-xs text-slate-400">System Default</p>
</div>
</div>
<span class="text-xs font-semibold text-primary">ON</span>
</div>
<!-- Item: Help -->
<button class="flex items-center gap-4 p-4 w-full text-left hover:bg-gray-50 dark:hover:bg-white/10 transition-colors group">
<div class="flex items-center justify-center rounded-full bg-gray-100 dark:bg-white/10 text-slate-600 dark:text-primary shrink-0 size-10">
<span class="material-symbols-outlined">help</span>
</div>
<div class="flex-1 min-w-0">
<p class="text-base font-medium truncate group-hover:text-primary transition-colors">Help &amp; Support</p>
</div>
<span class="material-symbols-outlined text-slate-400 dark:text-gray-600">chevron_right</span>
</button>
</div>
</div>
<!-- Footer Actions -->
<div class="w-full px-4 mt-8 mb-4">
<button class="w-full bg-white dark:bg-transparent border border-red-200 dark:border-red-900/50 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 font-bold py-4 rounded-full transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined">logout</span>
                Log Out
            </button>
<p class="text-center text-xs text-slate-400 mt-6">Version 2.4.0 (Build 302)</p>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full bg-background-light/90 dark:bg-background-dark/95 backdrop-blur-lg border-t border-gray-200 dark:border-white/5 pb-6 pt-3 px-6 z-50">
<div class="flex justify-between items-end max-w-md mx-auto">
<button class="flex flex-col items-center gap-1 group w-1/3">
<div class="p-1 rounded-xl group-hover:bg-gray-100 dark:group-hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-slate-400 dark:text-gray-500 group-hover:text-slate-900 dark:group-hover:text-white transition-colors" style="font-variation-settings: 'FILL' 0;">work</span>
</div>
<span class="text-[10px] font-medium text-slate-400 dark:text-gray-500 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">Jobs</span>
</button>
<button class="flex flex-col items-center gap-1 group w-1/3">
<div class="p-1 rounded-xl group-hover:bg-gray-100 dark:group-hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-slate-400 dark:text-gray-500 group-hover:text-slate-900 dark:group-hover:text-white transition-colors" style="font-variation-settings: 'FILL' 0;">history</span>
</div>
<span class="text-[10px] font-medium text-slate-400 dark:text-gray-500 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">History</span>
</button>
<button class="flex flex-col items-center gap-1 group w-1/3">
<div class="p-1 rounded-xl">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<span class="text-[10px] font-bold text-primary">Profile</span>
</button>
</div>
</nav>
</body></html>
