services:
  mysql:
    image: mysql:8.4
    container_name: gnd-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: gnd-prisma2
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      TZ: UTC
    ports:
      - "3307:3306"
    volumes:
      - gnd_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  adminer:
    image: adminer:4
    container_name: gnd-mysql-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  gnd_mysql_data:
